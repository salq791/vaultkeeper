# Copy to config.toml next to docker-compose.yml. Secrets stay in .env.
[global]
# Payloads here are plaintext before restic encrypts them. Use encrypted host
# storage if local-at-rest confidentiality is required; see SECURITY.md.
staging_dir = "/staging"
secret_temp_dir = "/run/vaultkeeper"
restore_output_dir = "/data/restores"
restic_repo = "sftp:youraccount@youraccount.repo.borgbase.com:vaultkeeper"
restic_password = "${RESTIC_PASSWORD}"
restic_host = "vaultkeeper"
# Weekly prune followed by a full restic check, evaluated in this IANA zone.
maintenance_schedule = "0 3 * * 0"
timezone = "UTC"

[notify]
healthchecks_base = "https://hc-ping.com"
# webhook_url = "${SLACK_WEBHOOK}"
# [notify.ses]
# region = "us-east-1"
# from = "backups@example.com"
# to = ["admin@example.com"]

# Scratch databases for scheduled verify runs. Start them with:
#   docker compose --profile verify up -d
[verify]
# VERIFY_PG_PASSWORD is substituted textually into this URL: use a URL-safe or percent-encoded value.
postgres_url = "postgres://verifier:${VERIFY_PG_PASSWORD}@verify-postgres:5432/scratch?sslmode=disable"
# Do not put a database name in this URI: mongorestore restores the dump's own database names.
mongodb_uri = "mongodb://verify-mongo:27017"
