services:
  source-postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_PASSWORD: sourcepw
      POSTGRES_DB: app
    volumes:
      - ./scripts/smoke-seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 2s
      timeout: 3s
      retries: 30

  source-mongo:
    image: mongo:8
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ping: 1})'"]
      interval: 2s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: smokeadmin
      MINIO_ROOT_PASSWORD: smokesecret
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 3s
      retries: 30

  mock-supabase-api:
    image: nginx:1.29-alpine
    volumes:
      - ./scripts/smoke-api:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/v1/projects/smoke-project/config/auth >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 30

  scratch-postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: verifier
      POSTGRES_PASSWORD: p@ss/word
      POSTGRES_DB: scratch
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verifier -d scratch"]
      interval: 2s
      timeout: 3s
      retries: 30

  scratch-mongo:
    image: mongo:8
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ping: 1})'"]
      interval: 2s
      timeout: 3s
      retries: 30

  vaultkeeper:
    image: vaultkeeper:smoke
    # user: "0" is smoke-only: named volumes mount root-owned and the smoke
    # does not test unix permissions; the production compose keeps the
    # image's non-root user.
    user: "0"
    entrypoint: ["sleep", "infinity"]
    # The smoke replaces PID 1 with `sleep infinity`, which intentionally has
    # none of the daemon's SIGTERM handling. Keep disposable teardown fast.
    stop_grace_period: 1s
    environment:
      VAULTKEEPER_CONFIG: /config/config.toml
      VAULTKEEPER_DB: /data/vaultkeeper.db
      VAULTKEEPER_MASTER_KEY: "1111111111111111111111111111111111111111111111111111111111111111"
      RESTIC_PASSWORD: smokerepopw
    volumes:
      - ./scripts/smoke-config.toml:/config/config.toml:ro
      - ./scripts/smoke-functions:/project/functions:ro
      - ./scripts/smoke-supabase.sh:/smoke/supabase-shim:ro
      - smoke-repo:/repo
      - smoke-staging:/staging
      - smoke-data:/data
    tmpfs:
      - /run/vaultkeeper:mode=0700

volumes:
  smoke-repo:
  smoke-staging:
  smoke-data:
